<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Practice — Изучение японских иероглифов</title>
    <style>
        :root {
            --primary: #4A90D9;
            --success: #4CAF50;
            --warning: #FF9800;
            --danger: #F44336;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #fafafa;
            color: #333;
            text-align: center;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: var(--primary);
        }
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 18px;
        }
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 500px) {
            .cards { grid-template-columns: 1fr; }
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-decoration: none;
            color: #333;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }
        .card-icon {
            font-size: 48px;
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
        }
        .card-desc {
            font-size: 14px;
            color: #888;
            line-height: 1.4;
        }
    </style>
</head>
<body>
<h1>🖌 Kanji Practice</h1>
<p class="subtitle">Изучайте японские иероглифы с умом</p>

<div class="cards">
    <a href="/practice.html" class="card">
        <div class="card-icon">✍️</div>
        <div class="card-title">Практика письма</div>
        <div class="card-desc">Рисуйте иероглифы по чертам с проверкой правильности</div>
    </a>

    <a href="/dictionary.html" class="card">
        <div class="card-icon">📚</div>
        <div class="card-title">Словарь</div>
        <div class="card-desc">Чтения, значения и примеры слов для каждого иероглифа</div>
    </a>

    <a href="/quiz.html" class="card">
        <div class="card-icon">📝</div>
        <div class="card-title">Задания</div>
        <div class="card-desc">Угадывайте чтения, значения и иероглифы</div>
    </a>

    <a href="/lessons.html" class="card">
        <div class="card-icon">📖</div>
        <div class="card-title">Уроки</div>
        <div class="card-desc">Система уроков с интервальным повторением</div>
    </a>
</div>
</body>
</html>
