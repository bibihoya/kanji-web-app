<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Practice — Проверка написания иероглифов</title>
    <style>
        :root {
            --primary: #4A90D9;
            --success: #4CAF50;
            --warning: #FF9800;
            --danger: #F44336;
            --gray: #999;
            --light: #f5f5f5;
            --border: #ddd;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background: #fafafa;
            color: #333;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
            color: var(--primary);
        }
        .panel {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }
        .filters {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filters label {
            font-weight: 600;
            font-size: 14px;
            color: #666;
        }
        select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            min-width: 120px;
        }
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
        }
        canvas {
            border: 2px solid var(--border);
            border-radius: 12px;
            touch-action: none;
            background: #fff;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }
        button {
            padding: 10px 18px;
            margin: 3px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        button:active {
            transform: translateY(0);
        }
        .primary { background: var(--primary); color: white; }
        .secondary { background: #e9ecef; color: #333; }
        .secondary:hover { background: #dee2e6; }
        .danger { background: var(--danger); color: white; }
        .success { background: var(--success); color: white; }
        .btn-group {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .result {
            padding: 15px;
            background: white;
            border-radius: 12px;
            min-height: 50px;
            box-shadow: var(--shadow);
        }
        .feedback {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 10px;
            transition: color 0.3s;
        }
        .stroke-info {
            margin: 10px 0;
            font-size: 15px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .stroke-info strong { color: var(--primary); }
        .attempts { color: var(--danger); font-weight: bold; }
        .good { color: var(--success); }
        .ok { color: var(--warning); }
        .bad { color: var(--danger); }
        .progress-bar {
            display: flex;
            gap: 4px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .progress-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--border);
            transition: all 0.3s;
        }
        .progress-dot.active { border-color: #0066cc; background: #e3f0ff; }
        .progress-dot.done { border-color: var(--success); background: var(--success); }
        .progress-dot.failed { border-color: var(--danger); background: var(--danger); }
        .progress-dot.pending { border-color: var(--gray); background: transparent; }
        .tooltip {
            position: relative;
            display: inline-block;
        }
        .tooltip .tooltiptext {
            visibility: hidden;
            background: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 4px 8px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            white-space: nowrap;
        }
        .tooltip:hover .tooltiptext { visibility: visible; }
    </style>
</head>
<body>
<h1>🖌 Kanji Practice</h1>

<!-- Панель фильтров -->
<div class="panel">
    <div class="filters">
        <label for="levelSelect">Уровень:</label>
        <select id="levelSelect" onchange="loadKanjiList()">
            <option value="">Все уровни</option>
            <option value="N5">JLPT N5 (начальный)</option>
            <option value="N4">JLPT N4 (базовый)</option>
            <option value="N3">JLPT N3 (средний)</option>
            <option value="N2">JLPT N2 (продвинутый)</option>
            <option value="N1">JLPT N1 (профессиональный)</option>
        </select>

        <label for="kanjiSelect">Иероглиф:</label>
        <select id="kanjiSelect" onchange="onKanjiSelect()">
            <option value="">-- Выберите --</option>
        </select>
    </div>
</div>

<!-- Панель управления -->
<div class="panel">
    <div class="stroke-info">
        <span>Черта: <strong id="currentStrokeNum">1</strong> / <strong id="totalStrokes">0</strong></span>
        <span>Попытки: <span id="attemptsCount" class="attempts">0/3</span></span>
    </div>

    <!-- Индикатор прогресса черт -->
    <div class="progress-bar" id="progressBar"></div>

    <div class="btn-group">
        <button class="secondary" onclick="undoStroke()">↩ Отменить</button>
        <button class="secondary" onclick="resetAll()">🗑 Очистить</button>
        <button class="primary" onclick="checkCurrentStroke()">✓ Проверить</button>
        <button class="secondary tooltip" onclick="toggleTemplate()">
            👁 Эталон
            <span class="tooltiptext">Показать/скрыть подсказку</span>
        </button>
    </div>
</div>

<!-- Холст -->
<div class="panel" style="padding: 10px; text-align: center;">
    <canvas id="canvas" width="400" height="400"></canvas>
</div>

<!-- Результат -->
<div id="result" class="result">
    <div id="feedback" class="feedback">👋 Выберите уровень и иероглиф, затем рисуйте черты</div>
    <div id="strokeDetails"></div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let strokes = [];
    let currentPoints = [];
    let isDrawing = false;
    let selectedKanji = '';
    let showTemplate = true;
    let templatePaths = [];
    let totalStrokesCount = 0;
    let currentStrokeIndex = 0;
    let attempts = 0;
    let strokeColors = [];
    let userStrokes = [];
    let allKanji = []; // Кеш списка иероглифов

    // Загрузка списка иероглифов при старте
    loadKanjiList();

    function loadKanjiList() {
        const level = document.getElementById('levelSelect').value;
        const url = level ? `/api/kanji?level=${level}` : '/api/kanji';

        fetch(url)
            .then(r => r.json())
            .then(kanji => {
                allKanji = kanji;
                const select = document.getElementById('kanjiSelect');
                select.innerHTML = '<option value="">-- Выберите иероглиф --</option>';
                kanji.forEach(k => {
                    const opt = document.createElement('option');
                    opt.value = k.id;
                    opt.textContent = `${k.character}${k.level ? ' [' + k.level + ']' : ''}`;
                    select.appendChild(opt);
                });
            })
            .catch(err => {
                console.error('Ошибка загрузки списка:', err);
            });
    }

    function onKanjiSelect() {
        const select = document.getElementById('kanjiSelect');
        selectedKanji = select.value;
        if (selectedKanji) {
            // Находим иероглиф в кеше
            const found = allKanji.find(k => k.id === selectedKanji);
            if (found) {
                loadTemplate(selectedKanji);
                resetAll();
            }
        }
    }

    async function loadTemplate(kanjiId) {
        if (!kanjiId) return;
        try {
            const resp = await fetch(`/api/template/${kanjiId}`);
            const svgText = await resp.text();
            const parser = new DOMParser();
            const svgDoc = parser.parseFromString(svgText, 'image/svg+xml');
            const paths = svgDoc.querySelectorAll('path');
            templatePaths = [];
            paths.forEach(path => {
                templatePaths.push(path.getAttribute('d'));
            });
            totalStrokesCount = templatePaths.length;
            document.getElementById('totalStrokes').textContent = totalStrokesCount;
            strokeColors = templatePaths.map((_, i) => i === 0 ? '#0066cc' : '#999999');
            currentStrokeIndex = 0;
            attempts = 0;
            updateStrokeInfo();
            updateProgressBar();
            redraw();
        } catch (err) {
            console.error('Не удалось загрузить эталон:', err);
            document.getElementById('feedback').textContent = 'Ошибка загрузки эталона';
        }
    }

    function updateProgressBar() {
        const bar = document.getElementById('progressBar');
        let html = '';
        for (let i = 0; i < totalStrokesCount; i++) {
            let cls = 'pending';
            if (strokeColors[i] === '#4CAF50') cls = 'done';
            else if (strokeColors[i] === '#F44336') cls = 'failed';
            else if (i === currentStrokeIndex) cls = 'active';
            html += `<div class="progress-dot ${cls}" title="Черта ${i+1}"></div>`;
        }
        bar.innerHTML = html;
    }

    function drawTemplate() {
        if (!showTemplate || templatePaths.length === 0) return;
        ctx.save();
        templatePaths.forEach((d, i) => {
            ctx.globalAlpha = (strokeColors[i] === '#999999') ? 0.15 : 0.5;
            ctx.strokeStyle = strokeColors[i] || '#0066cc';
            ctx.lineWidth = (i === currentStrokeIndex) ? 3 : 2;
            const p = new Path2D(d);
            ctx.stroke(p);
        });
        ctx.restore();
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); startDrawing(e.touches[0]); });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e.touches[0]); });
    canvas.addEventListener('touchend', stopDrawing);

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const canvasX = e.clientX - rect.left;
        const canvasY = e.clientY - rect.top;
        return {
            x: canvasX * 109 / canvas.width,
            y: canvasY * 109 / canvas.height
        };
    }

    function startDrawing(e) {
        if (!selectedKanji) {
            document.getElementById('feedback').textContent = '⚠ Сначала выберите иероглиф!';
            return;
        }
        if (currentStrokeIndex >= totalStrokesCount) {
            document.getElementById('feedback').textContent = '🎉 Все черты нарисованы!';
            return;
        }
        isDrawing = true;
        currentPoints = [];
        const pos = getPos(e);
        currentPoints.push(pos);
    }

    function draw(e) {
        if (!isDrawing) return;
        const pos = getPos(e);
        currentPoints.push(pos);
        redraw();
    }

    function stopDrawing() {
        if (!isDrawing) return;
        isDrawing = false;
        redraw();
    }

    function smoothPoints(points, minDist = 3) {
        if (points.length < 3) return points;
        const smoothed = [];
        smoothed.push(points[0]);
        for (let i = 1; i < points.length - 1; i++) {
            const sx = (points[i-1].x + points[i].x + points[i+1].x) / 3;
            const sy = (points[i-1].y + points[i].y + points[i+1].y) / 3;
            const last = smoothed[smoothed.length - 1];
            const dist = Math.hypot(sx - last.x, sy - last.y);
            if (dist >= minDist) smoothed.push({x: sx, y: sy});
        }
        smoothed.push(points[points.length - 1]);
        return smoothed;
    }

    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Эталон
        ctx.save();
        ctx.scale(canvas.width / 109, canvas.height / 109);
        drawTemplate();
        ctx.restore();

        // Текущая черта
        if (currentPoints.length > 1) {
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(currentPoints[0].x * canvas.width / 109, currentPoints[0].y * canvas.height / 109);
            for (let i = 1; i < currentPoints.length; i++) {
                ctx.lineTo(currentPoints[i].x * canvas.width / 109, currentPoints[i].y * canvas.height / 109);
            }
            ctx.stroke();
        }
    }

    async function checkCurrentStroke() {
        if (!selectedKanji) {
            document.getElementById('feedback').textContent = '⚠ Выберите иероглиф!';
            return;
        }
        if (currentStrokeIndex >= totalStrokesCount) {
            document.getElementById('feedback').innerHTML = '🎉 <span class="good">Все черты нарисованы!</span>';
            return;
        }
        if (currentPoints.length < 4) {
            document.getElementById('feedback').textContent = '✏ Нарисуйте черту (минимум 4 точки)';
            return;
        }

        const smoothed = smoothPoints(currentPoints, 3);

        const payload = {
            kanji: selectedKanji,
            strokeIndex: currentStrokeIndex,
            points: smoothed
        };

        try {
            const resp = await fetch('/api/check-stroke', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await resp.json();

            if (result.overallScore >= 0.80) {
                strokeColors[currentStrokeIndex] = '#4CAF50';

                const percentage = (result.overallScore * 100).toFixed(0);
                if (result.overallScore >= 0.90) {
                    document.getElementById('feedback').innerHTML =
                        `🎉 <span class="good">Отлично!</span> Черта ${currentStrokeIndex+1}: ${percentage}%`;
                } else {
                    document.getElementById('feedback').innerHTML =
                        `✅ <span class="good">Принято!</span> Черта ${currentStrokeIndex+1}: ${percentage}%`;
                }

                advanceStroke();
            } else {
                attempts++;
                updateStrokeInfo();

                // Мигаем фоном
                canvas.style.backgroundColor = '#ffcccc';
                setTimeout(() => { canvas.style.backgroundColor = '#ffffff'; }, 500);

                if (attempts >= 3) {
                    strokeColors[currentStrokeIndex] = '#F44336';
                    document.getElementById('feedback').innerHTML =
                        `😔 <span class="bad">Нужно повторить!</span> Черта ${currentStrokeIndex+1}: 3 неудачные попытки`;
                    advanceStroke();
                } else {
                    strokeColors[currentStrokeIndex] = '#F44336';
                    redraw();

                    const percentage = (result.overallScore * 100).toFixed(0);
                    document.getElementById('feedback').innerHTML =
                        `🔄 <span class="bad">Перерисуйте!</span> Попытка ${attempts}/3. Оценка: ${percentage}%`;

                    setTimeout(() => {
                        if (attempts < 3) {
                            strokeColors[currentStrokeIndex] = '#0066cc';
                        }
                        redraw();
                    }, 1500);
                }
            }
            updateProgressBar();
        } catch (err) {
            console.error('Ошибка проверки:', err);
            document.getElementById('feedback').textContent = '❌ Ошибка соединения с сервером';
        }

        currentPoints = [];
        redraw();
    }

    function advanceStroke() {
        currentStrokeIndex++;
        attempts = 0;
        updateStrokeInfo();
        currentPoints = [];

        if (currentStrokeIndex < totalStrokesCount) {
            strokeColors[currentStrokeIndex] = '#0066cc';
            document.getElementById('feedback').textContent += ' | Рисуйте следующую черту';
        } else {
            document.getElementById('feedback').innerHTML = '🎉 <span class="good">Все черты нарисованы! Отличная работа!</span>';
        }
        updateProgressBar();
        redraw();
    }

    function undoStroke() {
        if (currentStrokeIndex === 0) return;
        currentStrokeIndex--;
        strokeColors[currentStrokeIndex] = '#0066cc';
        for (let i = currentStrokeIndex + 1; i < totalStrokesCount; i++) {
            if (strokeColors[i] !== '#F44336') {
                strokeColors[i] = '#999999';
            }
        }
        attempts = 0;
        currentPoints = [];
        updateStrokeInfo();
        updateProgressBar();
        document.getElementById('feedback').textContent = '↩ Черта отменена. Перерисуйте.';
        redraw();
    }

    function resetAll() {
        strokes = [];
        userStrokes = [];
        currentPoints = [];
        currentStrokeIndex = 0;
        attempts = 0;
        strokeColors = templatePaths.map((_, i) => i === 0 ? '#0066cc' : '#999999');
        updateStrokeInfo();
        updateProgressBar();
        document.getElementById('feedback').textContent = '🔄 Начните заново. Рисуйте первую черту.';
        document.getElementById('strokeDetails').innerHTML = '';
        redraw();
    }

    function toggleTemplate() {
        showTemplate = !showTemplate;
        redraw();
    }

    function updateStrokeInfo() {
        document.getElementById('currentStrokeNum').textContent = currentStrokeIndex + 1;
        document.getElementById('attemptsCount').textContent = attempts + '/3';
    }

    // Поддержка клавиш
    document.addEventListener('keydown', function(e) {
        switch(e.key) {
            case 'Enter':
                e.preventDefault();
                checkCurrentStroke();
                break;
            case 'Backspace':
                e.preventDefault();
                undoStroke();
                break;
            case 'Escape':
                e.preventDefault();
                resetAll();
                break;
            case 't':
                if (!e.ctrlKey && !e.metaKey) {
                    toggleTemplate();
                }
                break;
        }
    });
</script>
</body>
</html>
