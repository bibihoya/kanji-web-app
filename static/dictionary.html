<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Словарь кандзи | Kanji Practice</title>
    <style>
        :root {
            --primary: #4A90D9;
            --success: #4CAF50;
            --warning: #FF9800;
            --danger: #F44336;
            --gray: #999;
            --light: #f5f5f5;
            --border: #ddd;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background: #fafafa;
            color: #333;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary);
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .nav a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .nav a:hover {
            background: #e3f0ff;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 18px;
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .search-box button {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .kanji-display {
            text-align: center;
            font-size: 80px;
            margin: 20px 0;
            color: #333;
        }
        .panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }
        .panel h3 {
            margin-bottom: 10px;
            color: var(--primary);
            font-size: 18px;
        }
        .reading {
            display: inline-block;
            background: #e3f0ff;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 4px;
            margin: 3px;
            font-size: 16px;
        }
        .word-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }
        .word-card:last-child { border-bottom: none; }
        .word-japanese {
            font-size: 20px;
            font-weight: 500;
        }
        .word-reading {
            color: var(--gray);
            font-size: 14px;
        }
        .word-meaning {
            color: #666;
            font-size: 14px;
        }
        .btn-practice {
            padding: 6px 12px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-practice:hover {
            background: #3d9142;
        }
        .empty-state {
            text-align: center;
            color: var(--gray);
            padding: 40px;
        }
        .error {
            color: var(--danger);
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
<h1>📚 Словарь кандзи</h1>

<div class="nav">
    <a href="/">🖌 Практика</a>
    <a href="/dictionary.html">📚 Словарь</a>
    <a href="/quiz.html">📝 Задания</a>
</div>

<div class="nav">
    <a href="/">← Практика написания</a>
</div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Введите иероглиф..." maxlength="1" autofocus>
    <button onclick="searchKanji()">🔍 Найти</button>
</div>

<div id="kanjiDisplay" class="kanji-display"></div>
<div id="result" class="empty-state">Введите иероглиф в поле поиска или нажмите на ссылку из практики</div>

<script>
    // Проверяем, передан ли иероглиф в URL (?kanji=日)
    const urlParams = new URLSearchParams(window.location.search);
    const kanjiParam = urlParams.get('kanji');
    if (kanjiParam) {
        document.getElementById('searchInput').value = kanjiParam;
        searchKanji();
    }

    // Поиск при нажатии Enter
    document.getElementById('searchInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') searchKanji();
    });

    async function searchKanji() {
        const kanji = document.getElementById('searchInput').value.trim();
        if (!kanji) return;

        try {
            const resp = await fetch(`/api/dictionary/${encodeURIComponent(kanji)}`);
            if (!resp.ok) {
                throw new Error('Иероглиф не найден');
            }
            const data = await resp.json();
            displayResult(kanji, data);
        } catch (err) {
            document.getElementById('result').innerHTML =
                `<div class="error">❌ Иероглиф "${kanji}" не найден в словаре</div>`;
            document.getElementById('kanjiDisplay').textContent = '';
        }
    }

    function displayResult(kanji, data) {
        document.getElementById('kanjiDisplay').textContent = kanji;

        let html = `<div class="panel">`;

        // Значение
        html += `<h3>📝 Значение</h3>`;
        html += `<p style="font-size: 18px;">${data.meaning}</p>`;

        // Чтения
        if (data.onyomi && data.onyomi.length > 0) {
            html += `<h3>📖 Онъёми (китайское чтение)</h3>`;
            data.onyomi.forEach(r => {
                html += `<span class="reading">${r}</span>`;
            });
        }

        if (data.kunyomi && data.kunyomi.length > 0) {
            html += `<h3>🗣 Кунъёми (японское чтение)</h3>`;
            data.kunyomi.forEach(r => {
                html += `<span class="reading">${r}</span>`;
            });
        }

        // Информация
        html += `<h3>ℹ Информация</h3>`;
        html += `<p>Уровень JLPT: <strong>${data.jlpt || '—'}</strong></p>`;
        html += `<p>Количество черт: <strong>${data.stroke_count || '—'}</strong></p>`;

        // Примеры слов
        if (data.words && data.words.length > 0) {
            html += `<h3>💬 Примеры слов</h3>`;
            data.words.forEach(w => {
                html += `
                        <div class="word-card">
                            <div>
                                <div class="word-japanese">${w.word}</div>
                                <div class="word-reading">${w.reading}</div>
                            </div>
                            <div>
                                <div class="word-meaning">${w.meaning}</div>
                            </div>
                        </div>
                    `;
            });
        }

        html += `</div>`;

        document.getElementById('result').innerHTML = html;
    }
</script>
</body>
</html>
