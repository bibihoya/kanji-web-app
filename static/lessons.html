<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уроки | Kanji Practice</title>
    <style>
        :root {
            --primary: #4A90D9; --success: #4CAF50; --warning: #FF9800;
            --danger: #F44336; --gray: #999; --border: #ddd;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px; margin: 0 auto; padding: 20px;
            background: #fafafa; color: #333;
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 10px; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .nav {
            display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; flex-wrap: wrap;
        }
        .nav a {
            color: var(--primary); text-decoration: none; padding: 6px 14px;
            border-radius: 6px; font-size: 14px; font-weight: 500;
        }
        .nav a:hover { background: #e3f0ff; }
        .nav a.active { background: var(--primary); color: white; }

        /* Список уроков */
        .lesson-list { display: flex; flex-direction: column; gap: 12px; }
        .lesson-card {
            background: white; border-radius: 14px; padding: 22px 25px;
            box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s;
            border: 2px solid transparent;
        }
        .lesson-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .lesson-card.completed { border-left: 5px solid var(--success); }
        .lesson-card h3 { margin-bottom: 5px; }
        .lesson-card p { font-size: 13px; color: var(--gray); }
        .lesson-badge {
            display: inline-block; background: var(--primary); color: white;
            padding: 6px 14px; border-radius: 20px; font-size: 13px; margin-top: 8px;
        }
        .lesson-card.completed .lesson-badge { background: var(--success); }
        .kanji-preview { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .kanji-chip {
            background: #f0f4ff; color: var(--primary); padding: 3px 8px;
            border-radius: 5px; font-size: 15px; font-weight: 500;
        }

        /* Экран урока */
        .lesson-view { display: none; }
        .lesson-view.active { display: block; }

        .progress-container { margin-bottom: 20px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); margin-bottom: 6px; }
        .progress-bar { height: 10px; background: #e9ecef; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); transition: width 0.4s; border-radius: 5px; }

        .step-screen {
            background: white; border-radius: 16px; padding: 30px;
            box-shadow: var(--shadow); text-align: center; min-height: 350px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .step-title {
            font-size: 20px; font-weight: 600; color: var(--primary); margin-bottom: 10px;
        }
        .step-subtitle { font-size: 14px; color: var(--gray); margin-bottom: 20px; }

        .dict-info {
            background: #f0f4ff; border-radius: 8px; padding: 12px;
            margin: 10px 0; font-size: 14px; display: inline-block;
        }
        .dict-info span { margin: 0 8px; }

        .mini-canvas {
            border: 2px solid var(--border); border-radius: 8px;
            touch-action: none; background: #fff; cursor: crosshair;
            display: block; margin: 10px auto;
        }

        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; margin: 5px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #3a7bc8; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #3d9142; }
        .btn-back { background: #e9ecef; color: #333; margin-bottom: 15px; }
        .btn-skip { background: #eee; color: #666; font-size: 12px; }

        .quiz-options { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .quiz-options button {
            padding: 12px 20px; border: 2px solid var(--border); border-radius: 10px;
            background: white; cursor: pointer; font-size: 16px; transition: all 0.2s;
            min-width: 120px;
        }
        .quiz-options button:hover { border-color: var(--primary); }
        .quiz-options button.correct { border-color: var(--success); background: #e8f5e9; font-weight: 600; }
        .quiz-options button.wrong { border-color: var(--danger); background: #ffebee; }
        .quiz-options button:disabled { opacity: 0.7; cursor: not-allowed; }
        .quiz-feedback { margin-top: 12px; font-weight: 600; font-size: 16px; min-height: 24px; }

        .lesson-complete {
            text-align: center; padding: 40px;
        }
        .lesson-complete .icon { font-size: 80px; }
        .lesson-complete h2 { color: var(--success); margin: 20px 0; }
        .lesson-complete p { color: var(--gray); margin-bottom: 20px; font-size: 16px; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
    </style>
</head>
<body>
<h1>📖 Уроки</h1>

<div class="nav">
    <a href="/">🏠 Главная</a>
    <a href="/practice.html">🖌 Практика</a>
    <a href="/dictionary.html">📚 Словарь</a>
    <a href="/quiz.html">📝 Задания</a>
    <a href="/lessons.html" class="active">📖 Уроки</a>
</div>

<div id="lessonList" class="lesson-list"></div>

<div id="lessonView" class="lesson-view">
    <button class="btn btn-back" onclick="backToList()">← К списку уроков</button>
    <h2 id="lessonTitle"></h2>
    <div class="progress-container">
        <div class="progress-label">
            <span id="progressLabel">Прогресс урока</span>
            <span id="progressText">0/0</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
    </div>
    <div id="stepScreen" class="step-screen"></div>
</div>

<script>
    let lessons = {};
    let currentLessonId = null;
    let completedSteps = {};
    let currentStepIndex = 0;
    let miniPoints = [];
    let miniCtx = null;
    let miniCanvas = null;
    let svgPaths = [];

    // Загрузка уроков
    fetch('/api/lessons')
        .then(r => r.json())
        .then(data => {
            lessons = data;
            loadProgress();
            renderLessonList();
        });

    function loadProgress() {
        const saved = localStorage.getItem('kanji_lesson_progress');
        if (saved) {
            const parsed = JSON.parse(saved);
            for (const [id, steps] of Object.entries(parsed)) {
                completedSteps[id] = new Set(steps);
            }
        }
    }

    function saveProgress() {
        const toSave = {};
        for (const [id, steps] of Object.entries(completedSteps)) {
            toSave[id] = [...steps];
        }
        localStorage.setItem('kanji_lesson_progress', JSON.stringify(toSave));
    }

    function renderLessonList() {
        const container = document.getElementById('lessonList');
        container.innerHTML = '';
        for (const [id, lesson] of Object.entries(lessons)) {
            const done = completedSteps[id]?.size || 0;
            const total = lesson.steps.length;
            const isCompleted = done === total;
            const card = document.createElement('div');
            card.className = `lesson-card${isCompleted ? ' completed' : ''}`;
            card.innerHTML = `
                    <h3>Урок ${id}: ${lesson.title}</h3>
                    <p>${lesson.description} · ${lesson.kanji.length} иероглифов · ${lesson.steps.length} шагов</p>
                    <div class="kanji-preview">${lesson.kanji.map(k => `<span class="kanji-chip">${k}</span>`).join('')}</div>
                    <div class="lesson-badge">${isCompleted ? '✅ Пройден' : `${done}/${total}`}</div>
                `;
            card.onclick = () => startLesson(id);
            container.appendChild(card);
        }
    }

    function startLesson(lessonId) {
        currentLessonId = lessonId;
        const lesson = lessons[lessonId];
        if (!lesson) return;
        document.getElementById('lessonList').style.display = 'none';
        document.getElementById('lessonView').classList.add('active');
        document.getElementById('lessonTitle').textContent = `Урок ${lessonId}: ${lesson.title}`;
        if (!completedSteps[lessonId]) completedSteps[lessonId] = new Set();

        // Находим первый незавершённый шаг
        currentStepIndex = 0;
        for (let i = 0; i < lesson.steps.length; i++) {
            if (!completedSteps[lessonId].has(i)) { currentStepIndex = i; break; }
        }

        if (currentStepIndex >= lesson.steps.length) {
            // Все шаги завершены
            showLessonComplete();
        } else {
            updateProgress();
            renderCurrentStep();
        }
    }

    function updateProgress() {
        const lesson = lessons[currentLessonId];
        const done = completedSteps[currentLessonId]?.size || 0;
        const total = lesson.steps.length;
        const percent = total > 0 ? Math.round(done / total * 100) : 0;
        document.getElementById('progressText').textContent = `${done}/${total}`;
        document.getElementById('progressFill').style.width = `${percent}%`;
    }

    async function renderCurrentStep() {
        const lesson = lessons[currentLessonId];
        const step = lesson.steps[currentStepIndex];
        const screen = document.getElementById('stepScreen');

        updateProgress();

        let html = '';
        html += `<div class="step-title">Шаг ${currentStepIndex+1} из ${lesson.steps.length}</div>`;
        html += `<div class="step-subtitle">${step.title}</div>`;

        if (step.type === 'practice') {
            // Загружаем информацию о кандзи
            let dictHTML = '';
            try {
                const resp = await fetch(`/api/dictionary/${encodeURIComponent(step.kanji)}`);
                if (resp.ok) {
                    const data = await resp.json();
                    const parts = [];
                    if (data.onyomi?.length) parts.push('Он: ' + data.onyomi.join(', '));
                    if (data.kunyomi?.length) parts.push('Кун: ' + data.kunyomi.join(', '));
                    if (data.meaning) parts.push(data.meaning);
                    dictHTML = `<div class="dict-info">${parts.join(' · ')}</div>`;
                }
            } catch(e) {}

            html += dictHTML;
            html += `<canvas id="miniCanvas" class="mini-canvas" width="300" height="300"></canvas>`;
            html += `<div class="btn-group">`;
            html += `<button class="btn btn-primary" onclick="clearCanvas()">🗑 Очистить</button>`;
            html += `<button class="btn btn-success" onclick="checkPractice()">✓ Проверить</button>`;
            html += `<button class="btn btn-skip" onclick="skipStep()">Пропустить</button>`;
            html += `</div>`;
            html += `<div id="stepFeedback" style="margin-top: 10px; font-weight: 600; min-height: 24px;"></div>`;

            screen.innerHTML = html;

            // Инициализируем canvas
            setTimeout(() => initPracticeCanvas(step.kanji), 100);

        } else if (step.type.startsWith('quiz_')) {
            // Определяем тип викторины
            let quizType = 'reading';
            if (step.type === 'quiz_meaning') quizType = 'meaning';
            else if (step.type === 'quiz_character') quizType = 'character';
            else if (step.type === 'quiz_mixed') {
                const types = ['reading', 'meaning', 'character'];
                quizType = types[Math.floor(Math.random() * 3)];
            }

            html += `<div id="quizArea">Загрузка вопроса...</div>`;
            html += `<div id="stepFeedback" style="margin-top: 10px; font-weight: 600; min-height: 24px;"></div>`;
            html += `<button class="btn btn-skip" onclick="skipStep()" style="margin-top: 15px;">Пропустить</button>`;

            screen.innerHTML = html;

            // Загружаем вопрос
            setTimeout(() => loadQuizQuestion(quizType, step), 100);
        }
    }

    // ========== ПРАКТИКА ПИСЬМА ==========
    async function initPracticeCanvas(kanji) {
        miniCanvas = document.getElementById('miniCanvas');
        if (!miniCanvas) return;
        miniCtx = miniCanvas.getContext('2d');
        miniPoints = [];

        // Загружаем эталон
        svgPaths = [];
        try {
            const resp = await fetch('/api/kanji');
            const all = await resp.json();
            const found = all.find(k => k.character === kanji);
            if (found) {
                const svgResp = await fetch(`/api/template/${found.id}`);
                const svgText = await svgResp.text();
                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svgText, 'image/svg+xml');
                svgPaths = [...svgDoc.querySelectorAll('path')].map(p => p.getAttribute('d'));
            }
        } catch(e) {}

        redrawCanvas();

        miniCanvas.onmousedown = e => {
            const rect = miniCanvas.getBoundingClientRect();
            miniPoints = [];
            miniPoints.push({
                x: (e.clientX - rect.left) * 109 / miniCanvas.width,
                y: (e.clientY - rect.top) * 109 / miniCanvas.height
            });
            miniCanvas.onmousemove = e2 => {
                const r = miniCanvas.getBoundingClientRect();
                miniPoints.push({
                    x: (e2.clientX - r.left) * 109 / miniCanvas.width,
                    y: (e2.clientY - r.top) * 109 / miniCanvas.height
                });
                redrawCanvas();
            };
        };
        miniCanvas.onmouseup = () => { miniCanvas.onmousemove = null; };
        miniCanvas.onmouseleave = () => { miniCanvas.onmousemove = null; };

        miniCanvas.ontouchstart = e => {
            e.preventDefault();
            const rect = miniCanvas.getBoundingClientRect();
            miniPoints = [];
            miniPoints.push({
                x: (e.touches[0].clientX - rect.left) * 109 / miniCanvas.width,
                y: (e.touches[0].clientY - rect.top) * 109 / miniCanvas.height
            });
            miniCanvas.ontouchmove = e2 => {
                e2.preventDefault();
                const r = miniCanvas.getBoundingClientRect();
                miniPoints.push({
                    x: (e2.touches[0].clientX - r.left) * 109 / miniCanvas.width,
                    y: (e2.touches[0].clientY - r.top) * 109 / miniCanvas.height
                });
                redrawCanvas();
            };
        };
        miniCanvas.ontouchend = () => { miniCanvas.ontouchmove = null; };
    }

    function redrawCanvas() {
        if (!miniCtx || !miniCanvas) return;
        miniCtx.clearRect(0, 0, miniCanvas.width, miniCanvas.height);
        // Эталон
        if (svgPaths.length > 0) {
            miniCtx.save();
            miniCtx.globalAlpha = 0.2;
            miniCtx.strokeStyle = '#0066cc';
            miniCtx.lineWidth = 2;
            miniCtx.scale(miniCanvas.width / 109, miniCanvas.height / 109);
            svgPaths.forEach(d => {
                const p = new Path2D(d);
                miniCtx.stroke(p);
            });
            miniCtx.restore();
        }
        // Текущая черта
        if (miniPoints.length > 1) {
            miniCtx.strokeStyle = '#000';
            miniCtx.lineWidth = 4;
            miniCtx.beginPath();
            miniCtx.moveTo(miniPoints[0].x * miniCanvas.width / 109, miniPoints[0].y * miniCanvas.height / 109);
            for (let i = 1; i < miniPoints.length; i++) {
                miniCtx.lineTo(miniPoints[i].x * miniCanvas.width / 109, miniPoints[i].y * miniCanvas.height / 109);
            }
            miniCtx.stroke();
        }
    }

    function clearCanvas() {
        miniPoints = [];
        redrawCanvas();
    }

    async function checkPractice() {
        const step = lessons[currentLessonId].steps[currentStepIndex];
        const kanji = step.kanji;

        if (miniPoints.length < 4) {
            document.getElementById('stepFeedback').innerHTML = '<span style="color: var(--danger);">Нарисуйте черту</span>';
            return;
        }

        // Находим ID иероглифа
        const resp = await fetch('/api/kanji');
        const all = await resp.json();
        const found = all.find(k => k.character === kanji);
        if (!found) {
            document.getElementById('stepFeedback').innerHTML = '<span style="color: var(--danger);">Иероглиф не найден</span>';
            return;
        }

        // Сглаживаем точки
        const smoothed = smoothPoints(miniPoints, 3);

        const payload = {
            kanji: found.id,
            strokeIndex: 0,
            points: smoothed
        };

        try {
            const checkResp = await fetch('/api/check-stroke', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const result = await checkResp.json();
            const fb = document.getElementById('stepFeedback');
            if (result.overallScore >= 0.70) {
                fb.innerHTML = `<span style="color: var(--success);">✅ Отлично! ${(result.overallScore*100).toFixed(0)}%</span>`;
                setTimeout(() => advanceStep(), 800);
            } else {
                fb.innerHTML = `<span style="color: var(--danger);">🔄 Попробуйте ещё раз (${(result.overallScore*100).toFixed(0)}%)</span>`;
            }
        } catch(e) {
            document.getElementById('stepFeedback').textContent = 'Ошибка проверки';
        }
    }

    function smoothPoints(points, minDist = 3) {
        if (points.length < 3) return points;
        const smoothed = [];
        smoothed.push(points[0]);
        for (let i = 1; i < points.length - 1; i++) {
            const sx = (points[i-1].x + points[i].x + points[i+1].x) / 3;
            const sy = (points[i-1].y + points[i].y + points[i+1].y) / 3;
            const last = smoothed[smoothed.length - 1];
            const dist = Math.hypot(sx - last.x, sy - last.y);
            if (dist >= minDist) smoothed.push({x: sx, y: sy});
        }
        smoothed.push(points[points.length - 1]);
        return smoothed;
    }

    // ========== ВИКТОРИНЫ ==========
    async function loadQuizQuestion(quizType, step) {
        const area = document.getElementById('quizArea');
        if (!area) return;

        try {
            const resp = await fetch(`/api/quiz?type=${quizType}&level=${lessons[currentLessonId].level}`);
            if (!resp.ok) throw new Error('Нет вопроса');
            const q = await resp.json();

            let questionText = '';
            if (quizType === 'character') {
                questionText = `Выберите иероглиф для: <strong>${q.prompt}</strong>`;
            } else {
                questionText = `Выберите правильный ответ для: <strong style="font-size: 40px;">${q.kanji}</strong>`;
            }

            let html = `<p style="font-size: 18px; margin-bottom: 15px;">${questionText}</p>`;
            html += '<div class="quiz-options">';
            q.options.forEach((opt, i) => {
                html += `<button onclick="answerQuiz(${i}, ${q.correctIndex}, this)" class="quiz-option">${opt}</button>`;
            });
            html += '</div>';
            area.innerHTML = html;
        } catch(e) {
            area.innerHTML = '<p>Ошибка загрузки вопроса. <button class="btn btn-skip" onclick="skipStep()">Пропустить</button></p>';
        }
    }

    function answerQuiz(chosenIndex, correctIndex, btn) {
        const buttons = document.querySelectorAll('.quiz-option');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === correctIndex) b.classList.add('correct');
            if (i === chosenIndex && i !== correctIndex) b.classList.add('wrong');
        });

        const fb = document.getElementById('stepFeedback');
        if (chosenIndex === correctIndex) {
            fb.innerHTML = '<span style="color: var(--success);">✅ Правильно!</span>';
            setTimeout(() => advanceStep(), 800);
        } else {
            fb.innerHTML = '<span style="color: var(--danger);">❌ Неправильно. Попробуйте снова.</span>';
            // Перезагружаем вопрос
            const step = lessons[currentLessonId].steps[currentStepIndex];
            let qt = 'reading';
            if (step.type === 'quiz_meaning') qt = 'meaning';
            else if (step.type === 'quiz_character') qt = 'character';
            else if (step.type === 'quiz_mixed') {
                qt = ['reading', 'meaning', 'character'][Math.floor(Math.random() * 3)];
            }
            setTimeout(() => loadQuizQuestion(qt, step), 1500);
        }
    }

    // ========== НАВИГАЦИЯ ==========
    function advanceStep() {
        if (!completedSteps[currentLessonId]) completedSteps[currentLessonId] = new Set();
        completedSteps[currentLessonId].add(currentStepIndex);
        saveProgress();

        const lesson = lessons[currentLessonId];
        let nextIndex = -1;
        for (let i = currentStepIndex + 1; i < lesson.steps.length; i++) {
            if (!completedSteps[currentLessonId].has(i)) { nextIndex = i; break; }
        }

        if (nextIndex === -1) {
            // Урок завершён
            currentStepIndex = lesson.steps.length;
            updateProgress();
            showLessonComplete();
        } else {
            currentStepIndex = nextIndex;
            updateProgress();
            renderCurrentStep();
        }
    }

    function skipStep() {
        advanceStep();
    }

    function showLessonComplete() {
        document.getElementById('progressText').textContent = '✅ Завершено';
        document.getElementById('progressFill').style.width = '100%';

        const screen = document.getElementById('stepScreen');
        screen.innerHTML = `
                <div class="lesson-complete">
                    <div class="icon">🎉</div>
                    <h2>Урок пройден!</h2>
                    <p>Отличная работа! Вы изучили ${lessons[currentLessonId].kanji.length} иероглифов.</p>
                    <button class="btn btn-primary" onclick="backToList()">← К списку уроков</button>
                </div>
            `;

        renderLessonList();
    }

    function backToList() {
        document.getElementById('lessonList').style.display = '';
        document.getElementById('lessonView').classList.remove('active');
        renderLessonList();
    }
</script>
</body>
</html>
