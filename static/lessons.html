<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уроки | Kanji Practice</title>
    <style>
        :root {
            --primary: #4A90D9;
            --success: #4CAF50;
            --warning: #FF9800;
            --danger: #F44336;
            --gray: #999;
            --border: #ddd;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #fafafa;
            color: #333;
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 10px; }
        .nav {
            display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; flex-wrap: wrap;
        }
        .nav a {
            color: var(--primary); text-decoration: none; padding: 6px 14px;
            border-radius: 6px; font-size: 14px; font-weight: 500;
        }
        .nav a:hover { background: #e3f0ff; }
        .nav a.active { background: var(--primary); color: white; }

        .lesson-list { display: flex; flex-direction: column; gap: 12px; }
        .lesson-card {
            background: white; border-radius: 14px; padding: 22px 25px;
            box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s;
            border: 2px solid transparent;
        }
        .lesson-card:hover {
            border-color: var(--primary); transform: translateY(-2px);
        }
        .lesson-card.completed { border-left: 5px solid var(--success); }
        .lesson-card h3 { margin-bottom: 5px; }
        .lesson-card p { font-size: 13px; color: var(--gray); }
        .lesson-badge {
            display: inline-block; background: var(--primary); color: white;
            padding: 6px 14px; border-radius: 20px; font-size: 13px; margin-top: 8px;
        }
        .lesson-card.completed .lesson-badge { background: var(--success); }
        .kanji-preview { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .kanji-chip {
            background: #f0f4ff; color: var(--primary); padding: 3px 8px;
            border-radius: 5px; font-size: 15px; font-weight: 500;
        }

        .lesson-view { display: none; }
        .lesson-view.active { display: block; }

        .progress-container { margin-bottom: 20px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); margin-bottom: 6px; }
        .progress-bar { height: 10px; background: #e9ecef; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); transition: width 0.4s; border-radius: 5px; }

        .step-card {
            background: white; border: 2px solid var(--border); border-radius: 12px;
            padding: 20px; margin-bottom: 15px; transition: all 0.3s;
        }
        .step-card.current { border-color: var(--primary); background: #f8faff; }
        .step-card.completed { border-color: var(--success); opacity: 0.65; }
        .step-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        .step-card.completed .step-title { color: var(--success); }

        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #3a7bc8; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #3d9142; }
        .btn-back { background: #e9ecef; color: #333; margin-bottom: 15px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .mini-canvas {
            border: 2px solid var(--border); border-radius: 8px;
            touch-action: none; background: #fff; cursor: crosshair;
            display: block; margin: 10px 0;
        }
        .quiz-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .quiz-options button {
            padding: 10px 18px; border: 2px solid var(--border); border-radius: 8px;
            background: white; cursor: pointer; font-size: 15px; transition: all 0.2s;
        }
        .quiz-options button:hover { border-color: var(--primary); }
        .quiz-options button.correct { border-color: var(--success); background: #e8f5e9; font-weight: 600; }
        .quiz-options button.wrong { border-color: var(--danger); background: #ffebee; }
        .quiz-options button:disabled { opacity: 0.7; cursor: not-allowed; }
        .quiz-feedback { margin-top: 8px; font-weight: 600; font-size: 14px; }

        .dict-info {
            background: #f0f4ff; border-radius: 8px; padding: 12px;
            margin: 10px 0; font-size: 14px;
        }
        .dict-info span { margin-right: 12px; }
    </style>
</head>
<body>
<h1>📖 Уроки</h1>

<div class="nav">
    <a href="/">🏠 Главная</a>
    <a href="/practice.html">🖌 Практика</a>
    <a href="/dictionary.html">📚 Словарь</a>
    <a href="/quiz.html">📝 Задания</a>
    <a href="/lessons.html" class="active">📖 Уроки</a>
</div>

<div id="lessonList" class="lesson-list"></div>

<div id="lessonView" class="lesson-view">
    <button class="btn btn-back" onclick="backToList()">← К списку уроков</button>
    <h2 id="lessonTitle"></h2>
    <div class="progress-container">
        <div class="progress-label">
            <span>Прогресс урока</span>
            <span id="progressText">0/0</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
    </div>
    <div id="stepContainer"></div>
</div>

<script>
    let lessons = {};
    let currentLessonId = null;
    let completedSteps = {};
    let currentStepIndex = 0;
    let kanjiDictCache = {}; // Кеш словаря

    fetch('/api/lessons')
        .then(r => r.json())
        .then(data => {
            lessons = data;
            loadProgress();
            renderLessonList();
        });

    function loadProgress() {
        const saved = localStorage.getItem('kanji_lesson_progress');
        if (saved) {
            const parsed = JSON.parse(saved);
            for (const [id, steps] of Object.entries(parsed)) {
                completedSteps[id] = new Set(steps);
            }
        }
    }

    function saveProgress() {
        const toSave = {};
        for (const [id, steps] of Object.entries(completedSteps)) {
            toSave[id] = [...steps];
        }
        localStorage.setItem('kanji_lesson_progress', JSON.stringify(toSave));
    }

    function renderLessonList() {
        const container = document.getElementById('lessonList');
        container.innerHTML = '';
        for (const [id, lesson] of Object.entries(lessons)) {
            const done = completedSteps[id]?.size || 0;
            const total = lesson.steps.length;
            const isCompleted = done === total;
            const card = document.createElement('div');
            card.className = `lesson-card${isCompleted ? ' completed' : ''}`;
            card.innerHTML = `
                    <h3>Урок ${id}: ${lesson.title}</h3>
                    <p>${lesson.description} · ${lesson.kanji.length} иероглифов · ${lesson.steps.length} шагов</p>
                    <div class="kanji-preview">${lesson.kanji.map(k => `<span class="kanji-chip">${k}</span>`).join('')}</div>
                    <div class="lesson-badge">${isCompleted ? '✅ Пройден' : `${done}/${total}`}</div>
                `;
            card.onclick = () => startLesson(id);
            container.appendChild(card);
        }
    }

    function startLesson(lessonId) {
        currentLessonId = lessonId;
        const lesson = lessons[lessonId];
        if (!lesson) return;
        document.getElementById('lessonList').style.display = 'none';
        document.getElementById('lessonView').classList.add('active');
        document.getElementById('lessonTitle').textContent = `Урок ${lessonId}: ${lesson.title}`;
        if (!completedSteps[lessonId]) completedSteps[lessonId] = new Set();
        currentStepIndex = 0;
        for (let i = 0; i < lesson.steps.length; i++) {
            if (!completedSteps[lessonId].has(i)) { currentStepIndex = i; break; }
        }
        renderSteps();
        updateProgress();
    }

    function updateProgress() {
        const lesson = lessons[currentLessonId];
        const done = completedSteps[currentLessonId]?.size || 0;
        const total = lesson.steps.length;
        const percent = total > 0 ? Math.round(done / total * 100) : 0;
        document.getElementById('progressText').textContent = `${done}/${total}`;
        document.getElementById('progressFill').style.width = `${percent}%`;
    }

    function renderSteps() {
        const lesson = lessons[currentLessonId];
        const container = document.getElementById('stepContainer');
        container.innerHTML = '';
        lesson.steps.forEach((step, i) => {
            const isCompleted = completedSteps[currentLessonId].has(i);
            const isCurrent = i === currentStepIndex && !isCompleted;
            const card = document.createElement('div');
            card.className = `step-card${isCurrent ? ' current' : ''}${isCompleted ? ' completed' : ''}`;
            card.id = `step-${i}`;
            let html = `<div class="step-title">Шаг ${i+1}: ${step.title}</div>`;
            if (isCompleted) {
                html += '<p style="color: var(--success);">✅ Выполнено</p>';
            } else if (isCurrent) {
                html += renderStepContent(step, i);
            } else {
                html += '<p style="color: var(--gray);">⏳ Ожидание</p>';
            }
            card.innerHTML = html;
            container.appendChild(card);
        });

        // Инициализируем активный шаг
        if (currentStepIndex < lesson.steps.length) {
            const step = lesson.steps[currentStepIndex];
            if (step.type === 'practice') initPracticeCanvas(currentStepIndex);
            if (step.type.startsWith('quiz_')) initMiniQuiz(currentStepIndex);
        }
    }

    function renderStepContent(step, index) {
        switch (step.type) {
            case 'practice':
                return `
                        <div class="dict-info" id="dict-${index}">Загрузка...</div>
                        <canvas id="miniCanvas-${index}" class="mini-canvas" width="300" height="300"></canvas>
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <button class="btn btn-primary" onclick="clearMiniCanvas(${index})">🗑 Очистить</button>
                            <button class="btn btn-success" onclick="checkMiniPractice(${index})">✓ Проверить</button>
                            <button class="btn" onclick="skipStep(${index})" style="background:#eee;">Пропустить →</button>
                        </div>
                        <div id="feedback-${index}" style="margin-top: 8px; font-weight: 600;"></div>
                    `;
            case 'quiz_reading':
            case 'quiz_meaning':
            case 'quiz_character':
            case 'quiz_mixed':
                return `
                        <div id="quizContainer-${index}">Загрузка вопроса...</div>
                        <button class="btn" onclick="skipStep(${index})" style="background:#eee; margin-top: 10px;">Пропустить →</button>
                    `;
            default:
                return `<button class="btn btn-success" onclick="completeStep(${index})">✓ Отметить как выполненное</button>`;
        }
    }

    // ========== ПРАКТИКА ПИСЬМА ==========
    let miniDrawing = {};
    let miniPoints = [];

    async function initPracticeCanvas(index) {
        const step = lessons[currentLessonId].steps[index];
        const kanji = step.kanji;

        // Загружаем инфо о кандзи
        const dictDiv = document.getElementById(`dict-${index}`);
        try {
            const resp = await fetch(`/api/dictionary/${encodeURIComponent(kanji)}`);
            if (resp.ok) {
                const data = await resp.json();
                const parts = [];
                if (data.onyomi?.length) parts.push('Он: ' + data.onyomi.join(', '));
                if (data.kunyomi?.length) parts.push('Кун: ' + data.kunyomi.join(', '));
                if (data.meaning) parts.push('Знач: ' + data.meaning);
                dictDiv.innerHTML = parts.join(' · ');
            }
        } catch(e) { dictDiv.textContent = ''; }

        const canvas = document.getElementById(`miniCanvas-${index}`);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        miniDrawing[index] = { ctx, canvas, points: [] };
        miniPoints = [];

        // Загружаем эталон
        let svgPaths = [];
        try {
            // Находим ID иероглифа из глобального списка
            const kanjiResp = await fetch('/api/kanji');
            const all = await kanjiResp.json();
            const found = all.find(k => k.character === kanji);
            if (found) {
                const svgResp = await fetch(`/api/template/${found.id}`);
                const svgText = await svgResp.text();
                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svgText, 'image/svg+xml');
                svgPaths = [...svgDoc.querySelectorAll('path')].map(p => p.getAttribute('d'));
            }
        } catch(e) {}

        function redrawMini() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Эталон
            if (svgPaths.length > 0) {
                ctx.save();
                ctx.globalAlpha = 0.2;
                ctx.strokeStyle = '#0066cc';
                ctx.lineWidth = 2;
                ctx.scale(canvas.width / 109, canvas.height / 109);
                svgPaths.forEach(d => {
                    const p = new Path2D(d);
                    ctx.stroke(p);
                });
                ctx.restore();
            }
            // Текущая черта
            if (miniPoints.length > 1) {
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(miniPoints[0].x * canvas.width / 109, miniPoints[0].y * canvas.height / 109);
                for (let i = 1; i < miniPoints.length; i++) {
                    ctx.lineTo(miniPoints[i].x * canvas.width / 109, miniPoints[i].y * canvas.height / 109);
                }
                ctx.stroke();
            }
        }

        canvas.onmousedown = e => {
            const rect = canvas.getBoundingClientRect();
            miniPoints = [];
            miniPoints.push({
                x: (e.clientX - rect.left) * 109 / canvas.width,
                y: (e.clientY - rect.top) * 109 / canvas.height
            });
            canvas.onmousemove = e2 => {
                const r = canvas.getBoundingClientRect();
                miniPoints.push({
                    x: (e2.clientX - r.left) * 109 / canvas.width,
                    y: (e2.clientY - r.top) * 109 / canvas.height
                });
                redrawMini();
            };
        };
        canvas.onmouseup = () => { canvas.onmousemove = null; redrawMini(); };
        canvas.onmouseleave = () => { canvas.onmousemove = null; redrawMini(); };

        // Touch
        canvas.ontouchstart = e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            miniPoints = [];
            miniPoints.push({
                x: (e.touches[0].clientX - rect.left) * 109 / canvas.width,
                y: (e.touches[0].clientY - rect.top) * 109 / canvas.height
            });
            canvas.ontouchmove = e2 => {
                e2.preventDefault();
                const r = canvas.getBoundingClientRect();
                miniPoints.push({
                    x: (e2.touches[0].clientX - r.left) * 109 / canvas.width,
                    y: (e2.touches[0].clientY - r.top) * 109 / canvas.height
                });
                redrawMini();
            };
        };
        canvas.ontouchend = () => { canvas.ontouchmove = null; redrawMini(); };

        redrawMini();
    }

    function clearMiniCanvas(index) {
        miniPoints = [];
        const d = miniDrawing[index];
        if (d) d.ctx.clearRect(0, 0, d.canvas.width, d.canvas.height);
    }

    async function checkMiniPractice(index) {
        const step = lessons[currentLessonId].steps[index];
        const kanji = step.kanji;

        // Находим ID иероглифа
        const resp = await fetch('/api/kanji');
        const all = await resp.json();
        const found = all.find(k => k.character === kanji);
        if (!found) {
            document.getElementById(`feedback-${index}`).innerHTML = '<span style="color:red;">Иероглиф не найден</span>';
            return;
        }

        const payload = {
            kanji: found.id,
            strokeIndex: 0,
            points: miniPoints
        };

        try {
            const checkResp = await fetch('/api/check-stroke', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const result = await checkResp.json();
            const fb = document.getElementById(`feedback-${index}`);
            if (result.overallScore >= 0.70) {
                fb.innerHTML = `<span style="color: var(--success);">✅ Отлично! ${(result.overallScore*100).toFixed(0)}% — черта принята</span>`;
                setTimeout(() => completeStep(index), 1000);
            } else {
                fb.innerHTML = `<span style="color: var(--danger);">🔄 Попробуйте ещё раз (${(result.overallScore*100).toFixed(0)}%)</span>`;
            }
        } catch(e) {
            document.getElementById(`feedback-${index}`).textContent = 'Ошибка проверки';
        }
    }

    // ========== МИНИ-ВИКТОРИНЫ ==========
    async function initMiniQuiz(index) {
        const step = lessons[currentLessonId].steps[index];
        const container = document.getElementById(`quizContainer-${index}`);
        if (!container) return;

        // Определяем тип
        let quizType = 'reading';
        if (step.type === 'quiz_meaning') quizType = 'meaning';
        else if (step.type === 'quiz_character') quizType = 'character';
        else if (step.type === 'quiz_mixed') {
            const types = ['reading', 'meaning', 'character'];
            quizType = types[Math.floor(Math.random() * 3)];
        }

        try {
            const resp = await fetch(`/api/quiz?type=${quizType}&level=${lessons[currentLessonId].level}`);
            if (!resp.ok) throw new Error('Нет вопроса');
            const q = await resp.json();

            let html = `<p>${getQuestionText(quizType, q)}</p>`;
            html += '<div class="quiz-options">';
            q.options.forEach((opt, i) => {
                html += `<button onclick="answerMiniQuiz(${index}, ${i}, ${q.correctIndex}, this)" class="quiz-option">${opt}</button>`;
            });
            html += '</div>';
            html += `<div class="quiz-feedback" id="quizFeedback-${index}"></div>`;
            container.innerHTML = html;
        } catch(e) {
            container.innerHTML = `<p>Ошибка загрузки вопроса</p>`;
        }
    }

    function getQuestionText(type, q) {
        if (type === 'character') return `Выберите иероглиф для: <strong>${q.prompt}</strong>`;
        return `Выберите правильный ответ для: <strong>${q.kanji}</strong>`;
    }

    function answerMiniQuiz(stepIndex, chosenIndex, correctIndex, btn) {
        const container = document.getElementById(`quizContainer-${stepIndex}`);
        const buttons = container.querySelectorAll('.quiz-option');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === correctIndex) b.classList.add('correct');
            if (i === chosenIndex && i !== correctIndex) b.classList.add('wrong');
        });

        const fb = document.getElementById(`quizFeedback-${stepIndex}`);
        if (chosenIndex === correctIndex) {
            fb.innerHTML = '<span style="color: var(--success);">✅ Правильно!</span>';
            setTimeout(() => completeStep(stepIndex), 800);
        } else {
            fb.innerHTML = '<span style="color: var(--danger);">❌ Неправильно. Попробуйте снова.</span>';
            // Перезагружаем вопрос через 1.5 секунды
            setTimeout(() => initMiniQuiz(stepIndex), 1500);
        }
    }

    // ========== ОБЩИЕ ФУНКЦИИ ==========
    function completeStep(index) {
        if (!completedSteps[currentLessonId]) completedSteps[currentLessonId] = new Set();
        completedSteps[currentLessonId].add(index);
        saveProgress();
        const lesson = lessons[currentLessonId];
        let nextIndex = -1;
        for (let i = index + 1; i < lesson.steps.length; i++) {
            if (!completedSteps[currentLessonId].has(i)) { nextIndex = i; break; }
        }
        if (nextIndex === -1) {
            currentStepIndex = lesson.steps.length;
            alert('🎉 Урок пройден! Отличная работа!');
        } else {
            currentStepIndex = nextIndex;
        }
        renderSteps();
        updateProgress();
        renderLessonList();
    }

    function skipStep(index) {
        completeStep(index);
    }

    function backToList() {
        document.getElementById('lessonList').style.display = '';
        document.getElementById('lessonView').classList.remove('active');
        renderLessonList();
    }
</script>
</body>
</html>
